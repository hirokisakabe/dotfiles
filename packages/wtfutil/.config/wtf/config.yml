wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: orange
      normal: gray
  grid:
    columns: [32, 32, 32]
    rows: [10, 10, 10, 10]
  refreshInterval: 1
  mods:
    github_prs:
      type: github
      enabled: true
      position:
        top: 0
        left: 0
        height: 2
        width: 2
      refreshInterval: 300
      repositories:
        - "hirokisakabe/pptx-ai"
        - "hirokisakabe/kimari"
        - "hirokisakabe/dotfiles"
        - "hirokisakabe/pom-ai"
        - "hirokisakabe/hirokisakabe.com"
        - "hirokisakabe/payview"
        - "hirokisakabe/pom"
        - "hirokisakabe/pptx-glimpse"
        - "hirokisakabe/shirase"
        - "hirokisakabe/me"
        - "hirokisakabe/zenn"
        - "hirokisakabe/tascal"
        - "hirokisakabe/md-pptx"
        - "hirokisakabe/prompt2pptx"
        - "hirokisakabe/ugui"
        - "hirokisakabe/tascal-old-3"
        - "hirokisakabe/mcp-pptx-preview"
        - "hirokisakabe/kiretell"
        - "hirokisakabe/aws-ai-chat-sample"
        - "hirokisakabe/serifuai"
        - "hirokisakabe/slide"
        - "hirokisakabe/tuubi"
        - "hirokisakabe/nobiru"
        - "hirokisakabe/deborah"
        - "hirokisakabe/copilotkit-a2ui-sample"
        - "hirokisakabe/react-hono-sample"
        - "hirokisakabe/kappa-in-river-flow"
        - "hirokisakabe/migaka"
        - "hirokisakabe/pglite-sample"
        - "hirokisakabe/pptx2image"
      enableStatus: true
      username: "hirokisakabe"
    github_review:
      type: github
      enabled: true
      position:
        top: 0
        left: 2
        height: 2
        width: 1
      refreshInterval: 300
      repositories:
        - "hirokisakabe/pptx-ai"
        - "hirokisakabe/kimari"
        - "hirokisakabe/dotfiles"
        - "hirokisakabe/pom-ai"
        - "hirokisakabe/hirokisakabe.com"
        - "hirokisakabe/payview"
        - "hirokisakabe/pom"
        - "hirokisakabe/pptx-glimpse"
        - "hirokisakabe/shirase"
        - "hirokisakabe/me"
        - "hirokisakabe/zenn"
        - "hirokisakabe/tascal"
        - "hirokisakabe/md-pptx"
        - "hirokisakabe/prompt2pptx"
        - "hirokisakabe/ugui"
        - "hirokisakabe/tascal-old-3"
        - "hirokisakabe/mcp-pptx-preview"
        - "hirokisakabe/kiretell"
        - "hirokisakabe/aws-ai-chat-sample"
        - "hirokisakabe/serifuai"
        - "hirokisakabe/slide"
        - "hirokisakabe/tuubi"
        - "hirokisakabe/nobiru"
        - "hirokisakabe/deborah"
        - "hirokisakabe/copilotkit-a2ui-sample"
        - "hirokisakabe/react-hono-sample"
        - "hirokisakabe/kappa-in-river-flow"
        - "hirokisakabe/migaka"
        - "hirokisakabe/pglite-sample"
        - "hirokisakabe/pptx2image"
      customQueries:
        reviewRequests:
          title: "Review Requests"
          filter: "is:open is:pr review-requested:hirokisakabe"
      enableStatus: true
      username: "hirokisakabe"
    github_dependabot:
      type: github
      enabled: true
      position:
        top: 2
        left: 0
        height: 2
        width: 2
      refreshInterval: 300
      repositories:
        - "hirokisakabe/hirokisakabe.com"
        - "hirokisakabe/kappa-in-river-flow"
        - "hirokisakabe/payview"
        - "hirokisakabe/pom"
        - "hirokisakabe/pom-ai"
        - "hirokisakabe/pptx-glimpse"
        - "hirokisakabe/prompt2pptx"
      customQueries:
        dependabot:
          title: "Dependabot PRs"
          filter: "is:open is:pr author:app/dependabot"
      showMyPullRequests: false
      showOpenReviewRequests: false
      enableStatus: true
      username: "hirokisakabe"
    git:
      type: git
      enabled: true
      position:
        top: 2
        left: 2
        height: 1
        width: 1
      commitCount: 10
      commitFormat: short
      dateFormat: "Jan 02, 15:04"
      repositories:
        - "${HOME}/work/dotfiles"
    resourceusage:
      type: resourceusage
      enabled: true
      position:
        top: 3
        left: 2
        height: 1
        width: 1
      refreshInterval: 5
